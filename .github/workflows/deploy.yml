name: Deploy with Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        env:
          SHEET_ID:  ${{ secrets.SHEET_ID }}
          API_KEY:   ${{ secrets.API_KEY }}
          ADMIN_PIN: ${{ secrets.ADMIN_PIN }}
        run: |
          sed -i "s|YOUR_SHEET_ID_HERE|${FOOD_SHEET_ID}|g"  index.html
          sed -i "s|YOUR_API_KEY_HERE|${FOOD_API_KEY}|g"    index.html
          sed -i "s|YOUR_ADMIN_PIN_HERE|${FOOD_ADMIN_PIN}|g" index.html
          echo "✓ Secrets injected"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
